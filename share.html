<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Quiz · Memoory App</title>
<meta property="og:title" content="Quiz · Memoory App" />
<meta property="og:description" content="Réponds aux questions et teste tes connaissances !" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Memoory App" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="Quiz · Memoory App" />
<meta name="twitter:description" content="Réponds aux questions et teste tes connaissances !" />
<style>
:root{--bg:#F8FAFC;--surface:#fff;--variant:#F1F5F9;--primary:#6366F1;--text:#0F172A;--sub:#64748B;--red:#EF4444;--green:#22C55E;--border:#E2E8F0}
@media(prefers-color-scheme:dark){:root{--bg:#0F172A;--surface:#1E293B;--variant:#334155;--primary:#818CF8;--text:#F1F5F9;--sub:#94A3B8;--red:#F87171;--green:#4ADE80;--border:#334155}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;-webkit-font-smoothing:antialiased}
.shell{max-width:480px;margin:0 auto;padding:16px;padding-bottom:max(24px,env(safe-area-inset-bottom))}
.center{display:flex;align-items:center;justify-content:center;min-height:100dvh}
.card{background:var(--surface);border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);padding:20px}
.mb{margin-bottom:12px}
.ntitle{font-size:20px;font-weight:800;line-height:1.3}
.nsub{font-size:13px;color:var(--sub);margin-top:4px}
.ncontent{font-size:14px;line-height:1.7;max-height:240px;overflow:hidden;white-space:pre-wrap}
.ncontent.expanded{max-height:none}
.btn-link{background:none;border:none;color:var(--primary);font-size:13px;font-weight:600;cursor:pointer;padding:6px 0;display:block;width:100%;text-align:center}
.prog-wrap{display:flex;align-items:center}
.prog-track{flex:1;height:6px;background:var(--variant);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .4s}
.qlabel{font-size:11px;font-weight:700;color:var(--primary);letter-spacing:.5px}
.qtext{font-size:18px;font-weight:700;line-height:1.4}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{text-align:left;padding:14px 16px;border-radius:12px;font-size:14px;font-weight:500;border:1.5px solid rgba(99,102,241,.3);background:rgba(99,102,241,.08);color:var(--text);cursor:pointer;transition:all .2s;width:100%}
button:disabled{opacity:.4;cursor:default}
.note-lbl{font-size:12px;font-weight:500;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.choice.correct{background:rgba(34,197,94,.12);color:var(--green);border-color:var(--green);opacity:1}
.choice.wrong{background:rgba(239,68,68,.12);color:var(--red);border-color:var(--red);opacity:1}
.row2{display:flex;gap:10px}
.row2>button{flex:1}
button{border:none;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;border-radius:14px;padding:14px 20px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s}
button:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:transparent;color:var(--sub);border:1.5px solid var(--border)}
.btn-ok{background:rgba(34,197,94,.12);color:var(--green);border:1.5px solid var(--green)}
.btn-wrong{background:rgba(239,68,68,.12);color:var(--red);border:1.5px solid var(--red)}
.scircle{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
.divider{border-top:1px solid var(--border)}
#spinner{display:flex;align-items:center;justify-content:center;min-height:100dvh}
.spin{width:40px;height:40px;border:4px solid var(--variant);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Full-screen quiz question layout */
.qpage{position:fixed;inset:0;background:var(--bg);display:flex;justify-content:center;z-index:50}
.qpage-inner{width:100%;max-width:480px;display:flex;flex-direction:column;padding:max(env(safe-area-inset-top,0px),16px) 16px max(env(safe-area-inset-bottom,0px),16px);gap:10px}
/* Flip card */
.flip-wrap{flex:1;position:relative;min-height:0;perspective:1200px}
.flip-inner{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.flip-inner.flipped{transform:rotateY(180deg)}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;gap:14px;padding:20px;border-radius:20px;background:var(--surface);border:1.5px solid var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);overflow:hidden}
.flip-back{transform:rotateY(180deg);background:rgba(99,102,241,.06)}
/* MCQ card in full-screen layout */
.mcq-card{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:20px;border-radius:20px;background:var(--surface);border:1.5px solid var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05)}
/* Full note modal */
.note-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto}
.note-modal-box{background:var(--surface);border-radius:20px;padding:20px;max-width:480px;width:calc(100% - 32px);margin:max(env(safe-area-inset-top,0px),24px) auto 24px}
</style>
</head>
<body>
<div id="spinner"><div class="spin"></div></div>
<div class="shell" id="app" style="display:none"></div>

<script>
(function() {
  var SUPABASE_URL = 'https://lvpnitxehagoknqesryf.supabase.co'
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2cG5pdHhlaGFnb2tucWVzcnlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTM4NTksImV4cCI6MjA5MDI2OTg1OX0.7owRNtMPRU1_v9E6fgPgN8F4TvQ6XAKKtbKlMRxAAPc'
  var APP_STORE_URL  = 'https://apps.apple.com/app/idXXXXXXXXX'
  var PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.memoory.app'

  var spinner = document.getElementById('spinner')
  var app     = document.getElementById('app')
  var token   = new URLSearchParams(window.location.search).get('token')

  function show(html) { app.innerHTML = html; spinner.style.display = 'none'; app.style.display = '' }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  if (!token) { show(page404()); return }

  fetch(SUPABASE_URL + '/rest/v1/rpc/get_shared_quiz', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ p_share_token: token })
  })
  .then(function(r) { return r.json() })
  .then(function(data) {
    if (!data || !data.questions) { show(page404()); return }
    var title = data.title && data.title.trim()
      ? data.title
      : (data.content || '').trim().slice(0, 50) + ((data.content || '').length > 50 ? '…' : '')
    startQuiz(title, data.content || '', data.questions || [])
  })
  .catch(function() { show(page404()) })

  // ── Quiz engine ──────────────────────────────────────────────────────────────

  function startQuiz(title, noteContent, questions) {
    var correct  = 0
    var isIOS    = /iPad|iPhone|iPod/.test(navigator.userAgent)
    var storeUrl = isIOS ? APP_STORE_URL : PLAY_STORE_URL

    var noteIconSvg = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>'

    function showIntro() {
      document.body.style.overflow = ''
      var expanded = false
      show(
        '<div style="display:flex;flex-direction:column;min-height:calc(100dvh - 48px)">'
        + '<div style="display:flex;flex-direction:column;align-items:center;padding:32px 0 20px">'
        + '<img src="/logo.png" alt="Memoory" style="width:72px;height:72px;border-radius:18px;object-fit:cover;flex-shrink:0">'
        + '<div style="margin-top:12px;font-size:24px;font-weight:700;color:var(--primary)">Memoory</div>'
        + '</div>'
        + '<div class="card mb"><div class="ntitle">' + esc(title) + '</div>'
        + '<div class="nsub">' + questions.length + ' question' + (questions.length !== 1 ? 's' : '') + '</div></div>'
        + '<div class="card mb"><div id="nc" class="ncontent">' + esc(noteContent) + '</div>'
        + '<button class="btn-link" id="tg">Voir plus</button></div>'
        + '<button class="btn-primary" id="start" style="margin-top:auto">&#9654;&#xFE0E;  Commencer le quiz</button>'
        + '<div style="text-align:right;padding-top:14px">'
        + '<a href="' + storeUrl + '" target="_blank" style="color:var(--primary);font-size:13px;font-weight:600;text-decoration:none">Télécharger Memoory</a>'
        + '</div>'
        + '</div>'
      )
      document.getElementById('start').onclick = function() { showQ(0) }
      document.getElementById('tg').onclick = function() {
        expanded = !expanded
        document.getElementById('nc').className = 'ncontent' + (expanded ? ' expanded' : '')
        document.getElementById('tg').textContent = expanded ? 'Voir moins' : 'Voir plus'
      }
    }

    function showQ(i) {
      var q     = questions[i]
      var pct   = Math.round((i + 1) / questions.length * 100)
      var isMcq = q.questionType === 'MCQ'
      document.body.style.overflow = 'hidden'

      var headerHtml =
        '<div style="display:flex;align-items:center;justify-content:center;gap:8px">'
        + '<img src="/logo.png" alt="Memoory" style="width:32px;height:32px;border-radius:8px;object-fit:cover;flex-shrink:0">'
        + '<span style="font-size:15px;font-weight:700;color:var(--primary)">Memoory</span>'
        + '</div>'
        + '<div><span style="font-size:13px;font-weight:500;color:var(--sub)">Question ' + (i + 1) + ' / ' + questions.length + '</span></div>'
        + '<div class="prog-wrap"><div class="prog-track"><div class="prog-fill" style="width:' + pct + '%"></div></div></div>'
        + '<div class="note-lbl">' + noteIconSvg + esc(title) + '</div>'

      var mainHtml, actionsHtml

      if (isMcq) {
        var choicesHtml = '<div class="choices">'
        for (var ci = 0; ci < q.mcqChoices.length; ci++) {
          choicesHtml += '<button class="choice" data-ok="' + (ci === q.mcqCorrectIndex ? '1' : '0') + '">'
            + esc(q.mcqChoices[ci]) + '</button>'
        }
        choicesHtml += '</div>'

        mainHtml =
          '<div class="mcq-card">'
          + '<div class="qlabel">🎯 QCM</div>'
          + '<div style="flex:1;display:flex;align-items:center;justify-content:center;overflow-y:auto">'
          + '<p class="qtext" style="text-align:center">' + esc(q.questionText) + '</p>'
          + '</div>'
          + choicesHtml
          + '</div>'

        actionsHtml = '<button class="btn-primary" id="mcq-next" disabled>Continuer</button>'

      } else {
        var ans = q.answerExcerpt || noteContent

        mainHtml =
          '<div class="flip-wrap">'
          + '<div class="flip-inner" id="flipper">'

          // ── Front: question ──
          + '<div class="flip-face">'
          + '<div class="qlabel">Question</div>'
          + '<div style="flex:1;display:flex;align-items:center;justify-content:center;overflow-y:auto">'
          + '<p class="qtext" style="text-align:center">' + esc(q.questionText) + '</p>'
          + '</div>'
          + '</div>'

          // ── Back: answer ──
          + '<div class="flip-face flip-back">'
          + '<div class="qlabel">Réponse</div>'
          + '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-y:auto;gap:14px">'
          + '<p class="qtext" style="text-align:center;white-space:pre-wrap">' + esc(ans) + '</p>'
          + '<button id="full-note" style="background:none;border:none;cursor:pointer;color:var(--primary);font-size:13px;font-weight:600;font-family:inherit;padding:0;width:auto;margin-top:10px">Voir la note complète</button>'
          + '</div>'
          + '</div>'

          + '</div>'
          + '</div>'

        actionsHtml = '<button class="btn-primary" id="reveal">Afficher la réponse</button>'
      }

      var modalHtml =
        '<div id="note-modal" class="note-modal">'
        + '<div class="note-modal-box">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
        + '<span style="font-size:16px;font-weight:700">Note complète</span>'
        + '<button id="close-x" style="width:auto;padding:4px;background:none;border:none;cursor:pointer;font-size:20px;line-height:1;color:var(--sub)">&#10005;</button>'
        + '</div>'
        + '<div style="border-top:1px solid var(--border);padding-top:14px;padding-bottom:14px">'
        + '<p style="font-size:14px;line-height:1.7;white-space:pre-wrap">' + esc(noteContent) + '</p>'
        + '</div>'
        + '<div style="border-top:1px solid var(--border);padding-top:14px">'
        + '<button id="close-btn" class="btn-primary">Fermer</button>'
        + '</div>'
        + '</div>'
        + '</div>'

      var dlLink = '<div style="text-align:right;padding-top:4px">'
        + '<a href="' + storeUrl + '" target="_blank" style="color:var(--primary);font-size:13px;font-weight:600;text-decoration:none">Télécharger Memoory</a>'
        + '</div>'

      show(
        '<div class="qpage"><div class="qpage-inner">'
        + headerHtml
        + mainHtml
        + '<div id="actions">' + actionsHtml + '</div>'
        + dlLink
        + '</div></div>'
        + modalHtml
      )

      if (isMcq) {
        var mcqResult = null
        var nextBtn = document.getElementById('mcq-next')
        document.querySelectorAll('.choice').forEach(function(btn) {
          btn.addEventListener('click', function() {
            if (mcqResult !== null) return
            var isOk = btn.getAttribute('data-ok') === '1'
            mcqResult = isOk
            document.querySelectorAll('.choice').forEach(function(b) {
              b.setAttribute('disabled', '')
              if (b.getAttribute('data-ok') === '1') b.className = 'choice correct'
              else if (b === btn && !isOk) b.className = 'choice wrong'
            })
            nextBtn.removeAttribute('disabled')
          })
        })
        nextBtn.addEventListener('click', function() { next(i, mcqResult) })

      } else {
        var revealed = false

        document.getElementById('reveal').onclick = function() {
          if (revealed) return
          revealed = true
          document.getElementById('flipper').classList.add('flipped')
          document.getElementById('actions').innerHTML =
            '<div class="row2">'
            + '<button class="btn-wrong" id="bw">&#10007;  J\'avais oublié</button>'
            + '<button class="btn-ok"    id="bo">&#10003;  J\'avais la réponse</button>'
            + '</div>'
          document.getElementById('bw').onclick = function() { next(i, false) }
          document.getElementById('bo').onclick = function() { next(i, true) }
        }

        document.getElementById('full-note').onclick = function() {
          document.getElementById('note-modal').style.display = 'block'
        }
        document.getElementById('note-modal').onclick = function(e) {
          if (e.target === this) this.style.display = 'none'
        }
        document.getElementById('close-x').onclick = function() {
          document.getElementById('note-modal').style.display = 'none'
        }
        document.getElementById('close-btn').onclick = function() {
          document.getElementById('note-modal').style.display = 'none'
        }
      }
    }

    function next(i, wasOk) {
      if (wasOk) correct++
      if (i + 1 < questions.length) showQ(i + 1)
      else showResults()
    }

    function showResults() {
      document.body.style.overflow = ''
      var total      = questions.length
      var pct        = total > 0 ? Math.round(correct * 100 / total) : 0
      var color      = pct >= 80 ? 'var(--green)' : pct >= 50 ? '#F59E0B' : 'var(--red)'
      var headline   = pct >= 80 ? '&#127881; Excellent !' : pct >= 50 ? '&#128077; Bien joué !' : '&#128170; Continue !'
      var sub        = pct >= 80 ? 'Tu maîtrises vraiment bien ce sujet.'
                     : pct >= 50 ? 'Encore un peu de pratique et tu seras au top.'
                     : "Reviens t'entraîner, tu vas y arriver !"
      var r = 54, c = 2 * Math.PI * r, f = c * (pct / 100)
      var svg = '<svg width="160" height="160" viewBox="0 0 160 160" style="position:absolute;top:-10px;left:-10px">'
        + '<circle cx="80" cy="80" r="' + r + '" fill="none" stroke="var(--variant)" stroke-width="10"/>'
        + '<circle cx="80" cy="80" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="10"'
        + ' stroke-dasharray="' + f + ' ' + (c - f) + '" stroke-dashoffset="' + (c * 0.25) + '"'
        + ' stroke-linecap="round" transform="rotate(-90 80 80)"/></svg>'
      var storeUrl = isIOS ? APP_STORE_URL : PLAY_STORE_URL
      var storeLbl = isIOS ? 'App Store' : 'Google Play'

      show(
        '<div style="display:flex;flex-direction:column;align-items:center;padding:32px 0 20px">'
        + '<img src="/logo.png" alt="Memoory" style="width:72px;height:72px;border-radius:18px;object-fit:cover;flex-shrink:0">'
        + '<div style="margin-top:12px;font-size:24px;font-weight:700;color:var(--primary)">Memoory</div>'
        + '</div>'
        + '<div style="display:flex;justify-content:center;margin:8px 0">'
        + '<div class="scircle">' + svg
        + '<div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center">'
        + '<div style="font-size:26px;font-weight:800;color:' + color + '">' + correct + '/' + total + '</div>'
        + '<div style="font-size:13px;font-weight:600;color:' + color + '">' + pct + '%</div>'
        + '</div></div></div>'
        + '<h2 style="text-align:center;margin:12px 0 4px">' + headline + '</h2>'
        + '<p style="text-align:center;color:var(--sub);font-size:14px;margin-bottom:20px">' + esc(sub) + '</p>'
        + '<button class="btn-outline" id="replay">&#8635;  Rejouer</button>'
        + '<div class="divider" style="margin:20px 0"></div>'
        + '<p style="text-align:center;color:var(--sub);font-size:13px;margin-bottom:12px">Envie de t\'entraîner encore plus ?</p>'
        + '<button class="btn-primary" id="store">Télécharger l\'app — ' + storeLbl + '</button>'
      )
      document.getElementById('replay').onclick = function() { correct = 0; showQ(0) }
      document.getElementById('store').onclick  = function() { window.open(storeUrl, '_blank') }
    }

    if (questions.length === 0) {
      show('<div class="card" style="text-align:center;padding:32px 20px"><div style="font-size:40px">&#128221;</div><h2 style="margin-top:12px">Aucune question</h2></div>')
    } else {
      showIntro()
    }
  }

  function page404() {
    return '<div class="center"><div class="card" style="text-align:center;padding:40px 24px">'
      + '<div style="font-size:48px;margin-bottom:16px">&#128269;</div>'
      + '<h2>Quiz introuvable</h2>'
      + '<p style="color:var(--sub);margin-top:8px;font-size:14px">Ce lien n\'est plus valide ou a été désactivé.</p>'
      + '</div></div>'
  }

})()
</script>
</body>
</html>
